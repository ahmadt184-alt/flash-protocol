<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>⚡ إرسال USDT فوري</title>
    <style>
        body { background: #030a09; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 340px; background: #0a1412; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #1a2e2a; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; background: #142622; color: white; border: 1px solid #253d38; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: #00ffa3; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,163,0.3); }
        #status { margin-top: 20px; font-size: 13px; color: #708581; min-height: 20px; }
        h2 { color: #00ffa3; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ إرسال USDT إلى أي عنوان</h2>
    
    <input type="text" id="to" placeholder="عنوان المستقبل" value="0x...">
    <input type="number" id="amount" placeholder="المبلغ (مثلاً: 5000)" value="5000">

    <button class="btn" onclick="send()">إرسال الآن</button>
    <div id="status">بانتظار التنفيذ...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
    // ✅ عنوان عقدك الجديد
    const CONTRACT_ADDR = "0x6D4323dE29fFF6F2Faa1F73639E61E88Df04d480";
    const USDT_LOGO = "https://cryptologos.cc/logos/tether-usdt-logo.png";

    const ABI = [{
        "inputs": [{"name":"to","type":"address"},{"name":"amountInUSDT","type":"uint256"}],
        "name": "temporalGrant",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    }];

    async function send() {
        const status = document.getElementById('status');
        try {
            if (!window.ethereum) return alert("افتح من Trust Wallet");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const sender = accounts[0];

            const to = document.getElementById('to').value.trim();
            const amount = document.getElementById('amount').value;

            if (!to || !/^(0x)?[0-9a-fA-F]{40}$/.test(to)) {
                return alert("يرجى إدخال عنوان صالح");
            }

            // إضافة التوكن تلقائيًّا
            status.innerText = "جارٍ إضافة USDT إلى المحفظة...";
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDR,
                            symbol: 'USDT',
                            decimals: 18,
                            image: USDT_LOGO
                        }
                    }
                });
            } catch (e) {
                console.warn("لم تُضف الأصول — قد لا يظهر للمستلم تلقائيًّا");
            }

            // إرسال الرصيد
            status.innerText = "جارٍ إرسال الرصيد...";
            const web3 = new Web3(window.ethereum);
            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
            await contract.methods.temporalGrant(to, amount).send({ from: sender, gas: 100000 });

            status.innerHTML = `<b style='color:#00ffa3;'>✅ تم إرسال ${amount} USDT إلى:<br>${to}</b>`;
        } catch (e) {
            console.error(e);
            status.innerText = "فشل: " + (e.message?.split('\n')[0] || e);
        }
    }
</script>
</body>
</html>
