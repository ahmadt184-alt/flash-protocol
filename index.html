<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>⚡ إرسال USDT فوري (Moathaq)</title>
    <style>
        body { background: #030a09; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 340px; background: #0a1412; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #1a2e2a; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        input { width: 100%; padding: 12px; background: #142622; color: white; border: 1px solid #253d38; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: #00ffa3; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,163,0.3); }
        #status { margin-top: 20px; font-size: 13px; color: #708581; min-height: 20px; }
        .price { font-size: 16px; color: #00ffa3; margin: 10px 0; }
        h2 { color: #00ffa3; margin: 10px 0; }
        .verified-badge { font-size: 12px; color: #00ffa3; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>🛡️ إرسال USDT موثق</h2>
    <span class="verified-badge">✅ Contract Verified on BscScan</span>
    
    <input type="text" id="to" placeholder="عنوان المستقبل" value="0x...">
    <input type="number" id="amount" placeholder="المبلغ (مثلاً: 5000)" value="5000">

    <button class="btn" onclick="send()">إرسال الآن</button>
    <div id="status">بانتظار التنفيذ...</div>
    <div id="price" class="price"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
    // ✅ تم تحديث العنوان للعقد الموثق الجديد
    const CONTRACT_ADDR = "0x6094168bCEb6DC84fd8E1BC90d6b1b69A5b85817";
    const USDT_LOGO = "https://cryptologos.cc/logos/tether-usdt-logo.png";
    const USD_PER_USDT = 1.00; 

    const ABI = [{
        "inputs": [{"name":"to","type":"address"},{"name":"amountInUSDT","type":"uint256"}],
        "name": "temporalGrant",
        "outputs": [],
        "stateMutability": "nonpayable",
        "type": "function"
    }, {
        "inputs": [{"name":"account","type":"address"}],
        "name": "balanceOf",
        "outputs": [{"name":"","type":"uint256"}],
        "stateMutability": "view",
        "type": "function"
    }];

    async function send() {
        const status = document.getElementById('status');
        const priceEl = document.getElementById('price');
        try {
            if (!window.ethereum) return alert("افتح من Trust Wallet أو MetaMask");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const sender = accounts[0];

            const to = document.getElementById('to').value.trim();
            const amount = parseInt(document.getElementById('amount').value) || 0;

            if (!to || !/^(0x)?[0-9a-fA-F]{40}$/.test(to)) {
                return alert("يرجى إدخال عنوان صالح");
            }
            if (amount <= 0) {
                return alert("المبلغ يجب أن يكون أكبر من صفر");
            }

            // عرض السعر قبل الإرسال
            priceEl.innerHTML = `<b>القيمة المتوقعة: ${amount.toLocaleString()} USDT = $${(amount * USD_PER_USDT).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</b>`;

            // إضافة التوكن للمحفظة (لضمان ظهور الشعار والسعر)
            status.innerText = "جارٍ إضافة USDT الموثق...";
            try {
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            address: CONTRACT_ADDR,
                            symbol: 'USDT',
                            decimals: 18,
                            image: USDT_LOGO
                        }
                    }
                });
            } catch (e) {
                console.warn("لم تُضف الأصول تلقائيًا، قد تحتاج لإضافتها يدويًا");
            }

            // إرسال الرصيد عبر العقد
            status.innerText = "جارٍ إرسال الرصيد...";
            const web3 = new Web3(window.ethereum);
            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);
            
            await contract.methods.temporalGrant(to, amount).send({ from: sender, gas: 100000 });

            // رسالة النجاح النهائية
            priceEl.innerHTML = "";
            status.innerHTML = `<b style='color:#00ffa3;'>✅ تم إرسال ${amount.toLocaleString()} USDT إلى:<br>${to}</b><br><b>القيمة: $${(amount * USD_PER_USDT).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</b>`;
        } catch (e) {
            console.error(e);
            status.innerText = "فشل: " + (e.message?.split('\n')[0] || e);
            priceEl.innerHTML = "";
        }
    }
</script>
</body>
</html>
